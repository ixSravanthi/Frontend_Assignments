<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./output.css" rel="stylesheet">
    <script src="errorHandle.js"></script>
    <script src="admin.js" defer></script>
    <title>Document</title>
</head>
<body class="flex flex-col h-100 items-center gap-10">
    <div class="text-3xl flex flex-col items-center">
        <div id="name"></div>
        <h2>Admin Permission Panel</h2>
    </div>

    <div class="flex gap-30">
        <div>
            <div class="text-2xl">Employee Permissions</div>
            <div class="flex flex-col">
                <label>
                <input type="checkbox" id="emp_viewReports"> View Reports
                </label>

                <label>
                <input type="checkbox" id="emp_editProfile"> Edit Profile
                </label>

                <label>
                <input type="checkbox" id="emp_editTasks"> Edit Tasks
                </label>
            </div>
        </div>

        <div>
            <div class="text-2xl">Manager Permissions</div>
            <div class="flex flex-col">
                <label>
                <input type="checkbox" id="mgr_viewReports"> View Reports
                </label>

                <label>
                <input type="checkbox" id="mgr_editProfile"> Edit Profile
                </label>

                <label>
                <input type="checkbox" id="mgr_editTasks"> Edit Tasks
                </label>
            </div>
        </div>
    </div>

    <button id="save_permissions" class="border rounded-md px-1 w-50">Save Permissions</button>
</body>
</html>
