<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./output.css" rel="stylesheet">
    <script src="errorHandle.js"></script>
    <script src="admin.js" defer></script>
    <title>Document</title>
</head>
<body>
    <div id="name"></div>
    <h2>Admin Permission Panel</h2>

    <div class="flex gap-5">
        <div>
            <h3>Employee Permissions</h3>
            <div class="flex flex-col">
                <label>
                <input type="checkbox" id="emp_viewReports"> View Reports
                </label>

                <label>
                <input type="checkbox" id="emp_editProfile"> Edit Profile
                </label>
            </div>
        </div>

        <div>
            <h3>Manager Permissions</h3>
            <div class="flex flex-col">
                <label>
                <input type="checkbox" id="mgr_viewReports"> View Reports
                </label>

                <label>
                <input type="checkbox" id="mgr_editProfile"> Edit Profile
                </label>
            </div>
        </div>
    </div>

    <button id="save_permissions" class="border rounded-md px-1  ">Save Permissions</button>
</body>
</html>
